services:
  - type: web
    name: education-management-backend
    runtime: node
    branch: main
    region: oregon
    plan: starter
    buildCommand: npm install && npm run prisma:generate && npm run build
    preDeployCommand: npm run prisma:migrate:deploy
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: DATABASE_URL
        fromDatabase:
          name: education-management-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: SWAGGER_TITLE
        value: Education Management API
      - key: SWAGGER_DESCRIPTION
        value: Production-grade backend for education management SaaS
      - key: SWAGGER_VERSION
        value: "1.0.0"
      - key: CORS_ORIGIN
        value: https://education-management-frontend.vercel.app
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: SMTP_FROM_NAME
        value: EduFlow
      - key: WHATSAPP_CALLMEBOT_API_KEY
        sync: false

databases:
  - name: education-management-postgres
    region: oregon
    plan: basic-256mb
